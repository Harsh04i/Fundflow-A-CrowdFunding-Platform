<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discover Projects | FundFlow</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="https://unpkg.com/feather-icons"></script>
    <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            return (
                <div className="min-h-screen bg-gray-50">
                    <Header />
                    <DiscoverPage />
                    <Footer />
                </div>
            );
        }

        function Header() {
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            const [scrolled, setScrolled] = useState(false);

            useEffect(() => {
                const handleScroll = () => {
                    if (window.scrollY > 50) {
                        setScrolled(true);
                    } else {
                        setScrolled(false);
                    }
                };

                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            return (
                <header className={`fixed w-full z-50 transition-all duration-300 ${scrolled ? 'bg-white shadow-md py-2' : 'bg-transparent py-4'}`}>
                    <div className="container mx-auto px-4">
                        <div className="flex justify-between items-center">
                            <div className="flex items-center">
                                <a href="/" className="flex items-center">
                                    <i data-feather="package" className="text-indigo-600 mr-2"></i>
                                    <span className="text-2xl font-bold text-indigo-600">FundFlow</span>
                                </a>
                            </div>
                            
                            <div className="hidden md:flex space-x-8">
                                <a href="/" className="text-gray-700 hover:text-indigo-600 font-medium">Home</a>
                                <a href="/discover" className="text-indigo-600 font-medium">Discover</a>
                                <a href="/start" className="text-gray-700 hover:text-indigo-600 font-medium">Start a Project</a>
                                <a href="/about" className="text-gray-700 hover:text-indigo-600 font-medium">About</a>
                            </div>
                            
                            <div className="hidden md:flex items-center space-x-4">
                                <button className="px-4 py-2 text-gray-700 hover:text-indigo-600 font-medium">
                                    <i data-feather="search" className="mr-1"></i> Search
                                </button>
                                <a href="/auth.html" className="px-4 py-2 bg-indigo-600 text-white rounded-md hover:bg-indigo-700 transition">
                                    <i data-feather="user" className="mr-1"></i> Sign In
                                </a>
                            </div>
                            
                            <button className="md:hidden p-2" onClick={() => setIsMenuOpen(!isMenuOpen)}>
                                <i data-feather={isMenuOpen ? "x" : "menu"}></i>
                            </button>
                        </div>
                        
                        {isMenuOpen && (
                            <div className="md:hidden mt-4 pb-4">
                                <div className="flex flex-col space-y-3">
                                    <a href="/" className="text-gray-700 hover:text-indigo-600 font-medium">Home</a>
                                    <a href="/discover" className="text-indigo-600 font-medium">Discover</a>
                                    <a href="/start" className="text-gray-700 hover:text-indigo-600 font-medium">Start a Project</a>
                                    <a href="/about" className="text-gray-700 hover:text-indigo-600 font-medium">About</a>
                                    <div className="pt-2 border-t border-gray-200">
                                        <button className="w-full px-4 py-2 bg-indigo-600 text-white rounded-md hover:bg-indigo-700 transition">
                                            Sign In
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                </header>
            );
        }

        function DiscoverPage() {
            const [activeCategory, setActiveCategory] = useState("All");
            const [sortBy, setSortBy] = useState("trending");
            const [searchQuery, setSearchQuery] = useState("");
            
            const categories = [
                "All",
                "Technology",
                "Design",
                "Fashion",
                "Food",
                "Home",
                "Health",
                "Gadgets",
                "Sustainability"
            ];
            
            const [products, setProducts] = useState([
                {
                    id: 1,
                    title: "Smart Home Assistant",
                    category: "Technology",
                    creator: "Tech Innovations Inc.",
                    description: "A voice-controlled assistant that integrates with all your smart devices.",
                    image: "http://static.photos/technology/640x360/1",
                    pledged: 125000,
                    goal: 100000,
                    backers: 843,
                    daysLeft: 15
                },
                {
                    id: 2,
                    title: "Eco-Friendly Water Bottle",
                    category: "Sustainability",
                    creator: "Green Living Co.",
                    description: "Self-cleaning water bottle with UV purification and temperature control.",
                    image: "http://static.photos/minimal/640x360/2",
                    pledged: 75000,
                    goal: 50000,
                    backers: 1204,
                    daysLeft: 8
                },
                {
                    id: 3,
                    title: "Modular Workstation",
                    category: "Design",
                    creator: "ErgoDesign",
                    description: "Adjustable desk system that adapts to your work style and space.",
                    image: "http://static.photos/office/640x360/3",
                    pledged: 45000,
                    goal: 60000,
                    backers: 321,
                    daysLeft: 22
                },
                {
                    id: 4,
                    title: "Smart Gardening Kit",
                    category: "Home",
                    creator: "Urban Green",
                    description: "Automated indoor gardening system with app control.",
                    image: "http://static.photos/nature/640x360/4",
                    pledged: 89000,
                    goal: 75000,
                    backers: 567,
                    daysLeft: 12
                },
                {
                    id: 5,
                    title: "Fitness Tracker Watch",
                    category: "Health",
                    creator: "FitTech",
                    description: "Advanced health monitoring with long battery life.",
                    image: "http://static.photos/technology/640x360/5",
                    pledged: 210000,
                    goal: 150000,
                    backers: 1890,
                    daysLeft: 5
                },
                {
                    id: 6,
                    title: "Minimalist Backpack",
                    category: "Fashion",
                    creator: "Simple Carry",
                    description: "Lightweight, durable backpack with smart organization.",
                    image: "http://static.photos/minimal/640x360/6",
                    pledged: 68000,
                    goal: 40000,
                    backers: 742,
                    daysLeft: 18
                }
            ]);
            
            const filteredProducts = products.filter(product => {
                const matchesCategory = activeCategory === "All" || product.category === activeCategory;
                const matchesSearch = product.title.toLowerCase().includes(searchQuery.toLowerCase()) || 
                                     product.description.toLowerCase().includes(searchQuery.toLowerCase());
                return matchesCategory && matchesSearch;
            });
            
            const sortedProducts = [...filteredProducts].sort((a, b) => {
                if (sortBy === "trending") {
                    return b.backers - a.backers;
                } else if (sortBy === "newest") {
                    return b.id - a.id;
                } else if (sortBy === "ending") {
                    return a.daysLeft - b.daysLeft;
                } else if (sortBy === "most-funded") {
                    return (b.pledged / b.goal) - (a.pledged / a.goal);
                }
                return 0;
            });

            return (
                <section className="pt-32 pb-16 px-4">
                    <div className="container mx-auto">
                        <div className="mb-12">
                            <h1 className="text-3xl font-bold text-gray-800 mb-2">Discover Innovative Products</h1>
                            <p className="text-gray-600">Find projects that inspire you</p>
                        </div>
                        
                        <div className="bg-white rounded-lg shadow-md p-6 mb-8">
                            <div className="flex flex-col md:flex-row md:items-center md:justify-between">
                                <div className="relative mb-4 md:mb-0 md:w-1/3">
                                    <i data-feather="search" className="absolute left-3 top-3 text-gray-400"></i>
                                    <input
                                        type="text"
                                        placeholder="Search projects..."
                                        className="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500"
                                        value={searchQuery}
                                        onChange={(e) => setSearchQuery(e.target.value)}
                                    />
                                </div>
                                
                                <div className="flex items-center space-x-4">
                                    <span className="text-gray-700">Sort by:</span>
                                    <select 
                                        className="border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500"
                                        value={sortBy}
                                        onChange={(e) => setSortBy(e.target.value)}
                                    >
                                        <option value="trending">Trending</option>
                                        <option value="newest">Newest</option>
                                        <option value="ending">Ending Soon</option>
                                        <option value="most-funded">Most Funded</option>
                                    </select>
                                </div>
                            </div>
                            
                            <div className="mt-6 overflow-x-auto">
                                <div className="flex space-x-2">
                                    {categories.map(category => (
                                        <button
                                            key={category}
                                            className={`px-4 py-2 rounded-full text-sm font-medium whitespace-nowrap ${activeCategory === category ? 'bg-indigo-600 text-white' : 'bg-gray-100 text-gray-700 hover:bg-gray-200'}`}
                                            onClick={() => setActiveCategory(category)}
                                        >
                                            {category}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </div>
                        
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                            {sortedProducts.map((product, index) => (
                                <div key={product.id} className="bg-white rounded-lg overflow-hidden shadow-md hover:shadow-lg transition" data-aos="fade-up" data-aos-delay={index * 50}>
                                    <div className="relative">
                                        <img src={product.image} alt={product.title} className="w-full h-48 object-cover" />
                                        <div className="absolute top-2 right-2 bg-indigo-600 text-white px-2 py-1 rounded text-xs font-medium">
                                            {product.category}
                                        </div>
                                    </div>
                                    <div className="p-6">
                                        <h3 className="text-xl font-bold text-gray-800 mb-2">{product.title}</h3>
                                        <p className="text-gray-600 text-sm mb-4">by {product.creator}</p>
                                        <p className="text-gray-700 mb-4">{product.description}</p>
                                        
                                        <div className="mb-4">
                                            <div className="flex justify-between text-sm text-gray-600 mb-1">
                                                <span>${product.pledged.toLocaleString()} pledged</span>
                                                <span>{Math.round((product.pledged / product.goal) * 100)}% funded</span>
                                            </div>
                                            <div className="w-full bg-gray-200 rounded-full h-2">
                                                <div 
                                                    className="bg-indigo-600 h-2 rounded-full" 
                                                    style={{ width: `${Math.min(100, (product.pledged / product.goal) * 100)}%` }}
                                                ></div>
                                            </div>
                                        </div>
                                        
                                        <div className="flex justify-between text-sm text-gray-600">
                                            <span>{product.backers} backers</span>
                                            <span>{product.daysLeft} days left</span>
                                        </div>
                                        
                                        <button className="mt-6 w-full py-2 bg-indigo-600 text-white rounded-md hover:bg-indigo-700 transition">
                                            Back This Project
                                        </button>
                                    </div>
                                </div>
                            ))}
                        </div>
                        
                        {sortedProducts.length === 0 && (
                            <div className="text-center py-12">
                                <i data-feather="package" className="w-12 h-12 text-gray-400 mx-auto mb-4"></i>
                                <h3 className="text-xl font-medium text-gray-700 mb-2">No projects found</h3>
                                <p className="text-gray-500">Try adjusting your search or filter criteria</p>
                            </div>
                        )}
                        
                        <div className="mt-10 flex justify-center">
                            <button className="px-6 py-3 border-2 border-indigo-600 text-indigo-600 rounded-md font-medium hover:bg-indigo-600 hover:text-white transition">
                                Load More Projects
                            </button>
                        </div>

                        <div className="mt-16 bg-indigo-50 rounded-lg p-8 text-center">
                            <h3 className="text-2xl font-bold text-indigo-700 mb-4">Can't find what you're looking for?</h3>
                            <p className="text-gray-600 mb-6 max-w-2xl mx-auto">Subscribe to get notified when new projects in your favorite categories launch</p>
                            <div className="flex max-w-md mx-auto">
                                <input 
                                    type="email" 
                                    placeholder="Your email address"
                                    className="flex-grow px-4 py-3 rounded-l-md border border-gray-300 focus:outline-none focus:ring-2 focus:ring-indigo-500"
                                />
                                <button className="px-6 py-3 bg-indigo-600 text-white rounded-r-md font-medium hover:bg-indigo-700 transition">
                                    Notify Me
                                </button>
                            </div>
                        </div>
                    </div>
                </section>
            );
        }

        function Footer() {
            return (
                <footer className="bg-gray-900 text-white py-12 px-4">
                    <div className="container mx-auto">
                        <div className="grid grid-cols-1 md:grid-cols-4 gap-8">
                            <div>
                                <div className="flex items-center mb-4">
                                    <i data-feather="package" className="text-indigo-400 mr-2"></i>
                                    <span className="text-2xl font-bold text-indigo-400">FundFlow</span>
                                </div>
                                <p className="text-gray-400 mb-4">Bringing innovative products to life through crowdfunding.</p>
                                <div className="flex space-x-4">
                                    <a href="#" className="text-gray-400 hover:text-white">
                                        <i data-feather="facebook"></i>
                                    </a>
                                    <a href="#" className="text-gray-400 hover:text-white">
                                        <i data-feather="twitter"></i>
                                    </a>
                                    <a href="#" className="text-gray-400 hover:text-white">
                                        <i data-feather="instagram"></i>
                                    </a>
                                    <a href="#" className="text-gray-400 hover:text-white">
                                        <i data-feather="linkedin"></i>
                                    </a>
                                </div>
                            </div>
                            
                            <div>
                                <h3 className="text-lg font-bold mb-4">For Creators</h3>
                                <ul className="space-y-2">
                                    <li><a href="#" className="text-gray-400 hover:text-white">How It Works</a></li>
                                    <li><a href="#" className="text-gray-400 hover:text-white">Pricing</a></li>
                                    <li><a href="#" className="text-gray-400 hover:text-white">Creator Handbook</a></li>
                                    <li><a href="#" className="text-gray-400 hover:text-white">Success Stories</a></li>
                                </ul>
                            </div>
                            
                            <div>
                                <h3 className="text-lg font-bold mb-4">For Backers</h3>
                                <ul className="space-y-2">
                                    <li><a href="#" className="text-gray-400 hover:text-white">Discover Projects</a></li>
                                    <li><a href="#" className="text-gray-400 hover:text-white">How Backing Works</a></li>
                                    <li><a href="#" className="text-gray-400 hover:text-white">Trust & Safety</a></li>
                                    <li><a href="#" className="text-gray-400 hover:text-white">FAQ</a></li>
                                </ul>
                            </div>
                            
                            <div>
                                <h3 className="text-lg font-bold mb-4">Company</h3>
                                <ul className="space-y-2">
                                    <li><a href="#" className="text-gray-400 hover:text-white">About Us</a></li>
                                    <li><a href="#" className="text-gray-400 hover:text-white">Careers</a></li>
                                    <li><a href="#" className="text-gray-400 hover:text-white">Terms of Service</a></li>
                                    <li><a href="#" className="text-gray-400 hover:text-white">Privacy Policy</a></li>
                                </ul>
                            </div>
                        </div>
                        
                        <div className="border-t border-gray-800 mt-10 pt-6 text-center text-gray-400">
                            <p>© {new Date().getFullYear()} FundFlow. All rights reserved.</p>
                        </div>
                    </div>
                </footer>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
    
    <script>AOS.init();</script>
    <script>feather.replace();</script>
</body>
</html>
