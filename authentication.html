<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | FundFlow</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="https://unpkg.com/feather-icons"></script>
    <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function App() {
            const [isLogin, setIsLogin] = useState(true);
            const [formData, setFormData] = useState({
                email: "",
                password: "",
                name: "",
                confirmPassword: ""
            });
            const [errors, setErrors] = useState({});
            const [loading, setLoading] = useState(false);

            const handleChange = (e) => {
                const { name, value } = e.target;
                setFormData({
                    ...formData,
                    [name]: value
                });
            };

            const validate = () => {
                const newErrors = {};
                
                if (!formData.email) {
                    newErrors.email = "Email is required";
                } else if (!/\S+@\S+\.\S+/.test(formData.email)) {
                    newErrors.email = "Email is invalid";
                }
                
                if (!formData.password) {
                    newErrors.password = "Password is required";
                }
                
                if (!isLogin) {
                    if (!formData.name) {
                        newErrors.name = "Name is required";
                    }
                    
                    if (!formData.confirmPassword) {
                        newErrors.confirmPassword = "Confirm Password is required";
                    } else if (formData.password !== formData.confirmPassword) {
                        newErrors.confirmPassword = "Passwords do not match";
                    }
                }
                
                setErrors(newErrors);
                return Object.keys(newErrors).length === 0;
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                if (validate()) {
                    setLoading(true);
                    // Simulate API call
                    setTimeout(() => {
                        setLoading(false);
                        alert(isLogin ? "Login successful!" : "Account created successfully!");
                    }, 1500);
                }
            };

            const switchMode = () => {
                setIsLogin(!isLogin);
                setErrors({});
            };

            return (
                <div className="min-h-screen flex flex-col">
                    <Header />
                    <main className="flex-grow flex items-center justify-center px-4 py-12">
                        <div className="w-full max-w-md bg-white rounded-xl shadow-md overflow-hidden">
                            <div className="bg-gradient-to-r from-indigo-500 to-purple-600 p-6 text-center">
                                <i data-feather="package" className="w-10 h-10 text-white mx-auto"></i>
                                <h1 className="text-2xl font-bold text-white mt-4">{isLogin ? "Welcome Back" : "Join FundFlow"}</h1>
                            </div>
                            <div className="p-8">
                                <form onSubmit={handleSubmit} className="space-y-6">
                                    {!isLogin && (
                                        <div>
                                            <label className="block text-gray-700 font-medium mb-2">Full Name</label>
                                            <input
                                                type="text"
                                                name="name"
                                                value={formData.name}
                                                onChange={handleChange}
                                                className={`w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500 ${errors.name ? "border-red-500" : "border-gray-300"}`}
                                                placeholder="Enter your full name"
                                            />
                                            {errors.name && <p className="text-red-500 text-sm mt-1">{errors.name}</p>}
                                        </div>
                                    )}
                                    
                                    <div>
                                        <label className="block text-gray-700 font-medium mb-2">Email Address</label>
                                        <input
                                            type="email"
                                            name="email"
                                            value={formData.email}
                                            onChange={handleChange}
                                            className={`w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500 ${errors.email ? "border-red-500" : "border-gray-300"}`}
                                            placeholder="Enter your email"
                                        />
                                        {errors.email && <p className="text-red-500 text-sm mt-1">{errors.email}</p>}
                                    </div>
                                    
                                    <div>
                                        <label className="block text-gray-700 font-medium mb-2">Password</label>
                                        <input
                                            type="password"
                                            name="password"
                                            value={formData.password}
                                            onChange={handleChange}
                                            className={`w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500 ${errors.password ? "border-red-500" : "border-gray-300"}`}
                                            placeholder="Enter your password"
                                        />
                                        {errors.password && <p className="text-red-500 text-sm mt-1">{errors.password}</p>}
                                    </div>
                                    
                                    {!isLogin && (
                                        <div>
                                            <label className="block text-gray-700 font-medium mb-2">Confirm Password</label>
                                            <input
                                                type="password"
                                                name="confirmPassword"
                                                value={formData.confirmPassword}
                                                onChange={handleChange}
                                                className={`w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500 ${errors.confirmPassword ? "border-red-500" : "border-gray-300"}`}
                                                placeholder="Confirm your password"
                                            />
                                            {errors.confirmPassword && <p className="text-red-500 text-sm mt-1">{errors.confirmPassword}</p>}
                                        </div>
                                    )}
                                    
                                    <div>
                                        <button
                                            type="submit"
                                            disabled={loading}
                                            className={`w-full px-4 py-2 bg-indigo-600 text-white rounded-md font-medium hover:bg-indigo-700 transition flex items-center justify-center ${loading ? "opacity-75" : ""}`}
                                        >
                                            {loading ? (
                                                <>
                                                    <svg className="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                                        <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle>
                                                        <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                                                    </svg>
                                                    Processing...
                                                </>
                                            ) : (
                                                isLogin ? "Sign In" : "Create Account"
                                            )}
                                        </button>
                                    </div>
                                </form>
                                
                                <div className="mt-6 border-t border-gray-200 pt-6">
                                    <p className="text-center text-gray-600">
                                        {isLogin ? "Don't have an account?" : "Already have an account?"}{" "}
                                        <button
                                            onClick={switchMode}
                                            className="text-indigo-600 font-medium hover:underline focus:outline-none"
                                        >
                                            {isLogin ? "Sign Up" : "Sign In"}
                                        </button>
                                    </p>
                                </div>
                                
                                <div className="mt-8">
                                    <div className="relative">
                                        <div className="absolute inset-0 flex items-center">
                                            <div className="w-full border-t border-gray-300"></div>
                                        </div>
                                        <div className="relative flex justify-center text-sm">
                                            <span className="px-2 bg-white text-gray-500">Or continue with</span>
                                        </div>
                                    </div>
                                    
                                    <div className="mt-6 grid grid-cols-2 gap-3">
                                        <button className="w-full flex justify-center py-2 px-4 border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                                            <i data-feather="github" className="w-5 h-5 mr-2"></i>
                                            GitHub
                                        </button>
                                        <button className="w-full flex justify-center py-2 px-4 border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                                            <i data-feather="google" className="w-5 h-5 mr-2"></i>
                                            Google
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </main>
                    <Footer />
                </div>
            );
        }

        function Header() {
            return (
                <header className="py-4">
                    <div className="container mx-auto px-4">
                        <div className="flex justify-between items-center">
                            <div className="flex items-center">
                                <a href="/" className="flex items-center">
                                    <i data-feather="package" className="text-indigo-600 mr-2"></i>
                                    <span className="text-2xl font-bold text-indigo-600">FundFlow</span>
                                </a>
                            </div>
                            
                            <div className="hidden md:flex space-x-6">
                                <a href="/" className="text-gray-700 hover:text-indigo-600 font-medium">Home</a>
                                <a href="/discover" className="text-gray-700 hover:text-indigo-600 font-medium">Discover</a>
                                <a href="/start" className="text-gray-700 hover:text-indigo-600 font-medium">Start a Project</a>
                                <a href="/about" className="text-gray-700 hover:text-indigo-600 font-medium">About</a>
                            </div>
                        </div>
                    </div>
                </header>
            );
        }

        function Footer() {
            return (
                <footer className="bg-gray-100 py-8 px-4">
                    <div className="container mx-auto">
                        <div className="flex flex-col md:flex-row justify-between items-center">
                            <div className="flex items-center mb-4 md:mb-0">
                                <i data-feather="package" className="text-indigo-400 mr-2"></i>
                                <span className="text-xl font-bold text-indigo-400">FundFlow</span>
                            </div>
                            
                            <div className="flex space-x-6">
                                <a href="#" className="text-gray-600 hover:text-indigo-600">
                                    <i data-feather="facebook"></i>
                                </a>
                                <a href="#" className="text-gray-600 hover:text-indigo-600">
                                    <i data-feather="twitter"></i>
                                </a>
                                <a href="#" className="text-gray-600 hover:text-indigo-600">
                                    <i data-feather="instagram"></i>
                                </a>
                                <a href="#" className="text-gray-600 hover:text-indigo-600">
                                    <i data-feather="linkedin"></i>
                                </a>
                            </div>
                        </div>
                        
                        <div className="border-t border-gray-200 mt-6 pt-6 text-center text-gray-500 text-sm">
                            <p>© {new Date().getFullYear()} FundFlow. All rights reserved.</p>
                        </div>
                    </div>
                </footer>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
    
    <script>AOS.init();</script>
    <script>feather.replace();</script>
</body>
</html>
